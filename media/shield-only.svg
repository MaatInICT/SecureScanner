<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460" width="400" height="460">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d1f33"/>
    </linearGradient>
    <linearGradient id="shieldHighlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Shield shape -->
  <path d="M200 15 L345 65 L345 230 C345 320 200 430 200 430 C200 430 55 320 55 230 L55 65 Z"
        fill="url(#shieldGrad)" filter="url(#shadow)"/>

  <!-- Shield highlight overlay -->
  <path d="M200 15 L345 65 L345 230 C345 320 200 430 200 430 C200 430 55 320 55 230 L55 65 Z"
        fill="url(#shieldHighlight)"/>

  <!-- Shield border -->
  <path d="M200 15 L345 65 L345 230 C345 320 200 430 200 430 C200 430 55 320 55 230 L55 65 Z"
        fill="none" stroke="#3a8fd6" stroke-width="3" stroke-opacity="0.6"/>

  <!-- Inner shield border -->
  <path d="M200 30 L332 75 L332 228 C332 310 200 412 200 412 C200 412 68 310 68 228 L68 75 Z"
        fill="none" stroke="#3a8fd6" stroke-width="1.5" stroke-opacity="0.25"/>
</svg>
